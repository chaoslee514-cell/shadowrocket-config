# QuantumultX 完整配置 - 国内直连 + 境外代理 + 广告屏蔽 + 银行绕过
# 基于 blackmatrix7/ios_rule_script 规则
# 推荐在 QuantumultX 中导入后手动添加订阅

[general]
dns_exclusion_list = *.cmpassport.com,*.pingan.com.cn,*.cmbchina.com,*.icbc.com.cn,*.bank.com.cn,*.ccb.com,*.abc.com.cn,*.boc.cn
server_check_url = http://www.qualcomm.cn/generate_204
geo_location_checker = http://ip-api.com/json/, https://raw.githubusercontent.com/crossutility/Quantumult-X/master/sample-location-with-script.js
# 建议开启 TUN 模式以更好绕过银行检测

[dns]
server = 223.5.5.5
server = 114.114.114.114
server = 8.8.8.8
server = 1.1.1.1
address = /cn/223.5.5.5

[policy]
static = 🚀 节点选择, select, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
static = 🇨🇳 国内, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png
static = 📺 苹果服务, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
static = 🛑 广告拦截, reject, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Reject.png

[filter_remote]
# 国内直连
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list, tag=🇨🇳 国内, force-policy=🇨🇳 国内, update-interval=86400, enabled=true
# 苹果服务 (推送正常)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Apple/Apple.list, tag=📺 苹果服务, force-policy=📺 苹果服务, update-interval=86400, enabled=true
# 广告拦截 (主流APP + 开屏广告)
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Advertising/Advertising.list, tag=🛑 广告拦截, force-policy=🛑 广告拦截, update-interval=86400, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Advertising/AdvertisingLite.list, tag=🛑 广告拦截, force-policy=🛑 广告拦截, update-interval=86400, enabled=true
# 支付宝/金融
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Alipay/Alipay.list, tag=🇨🇳 国内, force-policy=🇨🇳 国内, update-interval=86400, enabled=true

[filter_local]
host, localhost, direct
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 224.0.0.0/4, direct
geoip, cn, direct
# 银行APP绕过代理检测 - 强制直连
host-suffix, bank.com.cn, direct
host-suffix, cmbchina.com, direct
host-suffix, icbc.com.cn, direct
host-suffix, ccb.com, direct
host-suffix, abc.com.cn, direct
host-suffix, pingan.com.cn, direct
host-suffix, boc.cn, direct
host-suffix, unionpay.com, direct
# 最终规则：境外全部走代理
final, proxy

[server_remote]
# === 在这里添加你的节点订阅链接 ===
# 示例（请替换成你自己的订阅）：
# https://你的订阅地址, tag=我的节点, update-interval=86400, enabled=true

# 支持多个订阅
# https://sub1.example.com, tag=机场1, update-interval=43200, enabled=true
# https://sub2.example.com, tag=机场2, update-interval=43200, enabled=true

[rewrite_remote]
# 可选：额外重写规则进一步去开屏广告
# https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/QuantumultX/Advertising.conf, tag=去广告重写, enabled=true